<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha | Professional Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>INTERACTIVE IMAGE HUB</h1>
        <p>Seamlessly exploring high-quality visuals with dynamic filtering and responsive design.</p>
    </header>

    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="cars">Cars</button>
        <button class="filter-btn" data-filter="Butterfly">Butterfly</button>
    </div>

    <div class="gallery-container">
        <div class="gallery-item"><img src="images/Butterfly_01"></div>
        <div class="gallery-item"><img src="images/Butterfly_02"></div>
        <div class="gallery-item"><img src="images/Butterfly_03"></div>
        <div class="gallery-item"><img src="images/Cars_01"></div>
        <div class="gallery-item"><img src="images/Cars_02"></div>
        <div class="gallery-item"><img src="images/Nature_01"></div>
        <div class="gallery-item"><img src="images/Nature_02"></div>
        <div class="gallery-item"><img src="images/Nature_03"></div>
    </div>

    <div id="lightbox" class="modal">
        <div class="modal-overlay"></div>
        <span class="close-btn">&times;</span>
        <div class="modal-wrapper">
            <div class="nav-button prev-btn">&#10094;</div>
            <div class="img-box">
                <img class="modal-content" id="full-img">
            </div>
            <div class="nav-button next-btn">&#10095;</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
